name: gerar animação da cobrinha

on:
  schedule:
    - cron: "0 */12 * * *" 
  
  # permite que seja executado manualmente a qualquer momento
  workflow_dispatch:
  
  # roda a cada push na branch principal
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # faz o checkout do código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # gera os arquivos de animação da cobrinha a partir do seu perfil
      - name: Gerar github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # pega o arquivo gerado na pasta 'dist' e envia para a branch 'output'
      - name: Push dos arquivos gerados para a branch output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
